services:
  - type: web
    name: talentbridge-api
    env: java
    buildCommand: cd backend && mvn -DskipTests clean compile package
    startCommand: cd backend && java -cp target/classes:target/dependency/* com.talentbridge.api.TalentBridgeApplication
    plan: free
    envVars:
      - key: SUPABASE_DB_URL
        scope: all
      - key: SUPABASE_DB_USER
        scope: all
      - key: SUPABASE_DB_PASSWORD
        scope: all
      - key: SUPABASE_PROJECT_URL
        scope: all
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: all
      - key: OPENAI_API_KEY
        scope: all
      - key: GEMINI_API_KEY
        scope: all
      - key: ANTHROPIC_API_KEY
        scope: all
