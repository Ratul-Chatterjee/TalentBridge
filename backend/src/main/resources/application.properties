server.port=${SERVER_PORT:8080}
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
spring.sql.init.mode=never
spring.jpa.show-sql=false
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
app.supabase.project-url=${SUPABASE_PROJECT_URL:}
app.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
app.supabase.resume-bucket=${SUPABASE_RESUME_BUCKET:resumes}
app.llm.openai-key=${OPENAI_API_KEY:}
app.llm.gemini-key=${GEMINI_API_KEY:}
app.llm.anthropic-key=${ANTHROPIC_API_KEY:}
