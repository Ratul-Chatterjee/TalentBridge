server.address=0.0.0.0
server.port=${PORT:8080}
spring.datasource.url=${SUPABASE_DB_URL:jdbc:h2:mem:talentbridge;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SUPABASE_DB_USER:sa}
spring.datasource.password=${SUPABASE_DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:false}
spring.sql.init.mode=never
spring.jpa.show-sql=false
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
app.supabase.project-url=${SUPABASE_PROJECT_URL:}
app.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
app.supabase.resume-bucket=${SUPABASE_RESUME_BUCKET:resumes}
app.llm.openai-key=${OPENAI_API_KEY:}
app.llm.gemini-key=${GEMINI_API_KEY:}
app.llm.anthropic-key=${ANTHROPIC_API_KEY:}
